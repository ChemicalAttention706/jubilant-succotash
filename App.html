<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Shift Scheduler</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = { darkMode: 'class', }
    </script>
    
    <script>
        try {
            if (localStorage.getItem('scheduler_dark_mode') === 'true') {
                document.documentElement.classList.add('dark');
            }
        } catch (e) {}
    </script>

    <style>
        body { font-family: sans-serif; transition: background-color 0.3s, color 0.3s; }
        html.dark { color-scheme: dark; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        html.dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        html.dark ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        html { scrollbar-width: thin; scrollbar-color: #d1d5db transparent; }
        html.dark { scrollbar-color: #4b5563 transparent; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const SHIFT_TYPES = [
            { id: 'morning', name: '7am-1pm', hours: 6 },
            { id: 'afternoon', name: '1pm-7pm', hours: 6 },
            { id: 'evening', name: '7pm-12am', hours: 5 }
        ];
        
        const initialStudents = Array.from({ length: 15 }, (_, i) => ({
            id: i + 1, name: `Student ${i + 1}`, hours: 0, shifts: 0, unavailable: [] 
        }));

        const App = () => {
            const fileInputRef = useRef(null);

            const [isDarkMode, setIsDarkMode] = useState(() => {
                try { return JSON.parse(localStorage.getItem('scheduler_dark_mode')) || false; } catch (e) { return false; }
            });

            const [students, setStudents] = useState(() => {
                try {
                    const saved = localStorage.getItem('scheduler_students');
                    return saved ? JSON.parse(saved) : initialStudents;
                } catch (e) { return initialStudents; }
            });

            const [targets, setTargets] = useState(() => {
                try {
                    const saved = localStorage.getItem('scheduler_targets');
                    return saved ? JSON.parse(saved) : { morning: 2, afternoon: 2, evening: 2 };
                } catch (e) { return { morning: 2, afternoon: 2, evening: 2 }; }
            });

            // MULTI-WEEK STATE LOGIC
            const [currentWeek, setCurrentWeek] = useState(1);
            const [schedules, setSchedules] = useState(() => {
                try {
                    const saved = localStorage.getItem('scheduler_schedules_v2');
                    if (saved) return JSON.parse(saved);
                    
                    const oldSaved = localStorage.getItem('scheduler_schedule');
                    if (oldSaved) return { 1: JSON.parse(oldSaved) };
                    
                    return { 1: {} }; 
                } catch (e) { return { 1: {} }; }
            });

            const [newStudentName, setNewStudentName] = useState(""); 
            const [editingStudentId, setEditingStudentId] = useState(null); 

            // Active week alias
            const schedule = schedules[currentWeek] || {};

            // Helper to update current week's schedule
            const updateCurrentSchedule = (newScheduleData) => {
                setSchedules(prev => ({ ...prev, [currentWeek]: newScheduleData }));
            };

            useEffect(() => {
                localStorage.setItem('scheduler_dark_mode', JSON.stringify(isDarkMode));
                document.documentElement.classList.toggle('dark', isDarkMode);
            }, [isDarkMode]);

            useEffect(() => { localStorage.setItem('scheduler_students', JSON.stringify(students)); }, [students]);
            useEffect(() => { localStorage.setItem('scheduler_targets', JSON.stringify(targets)); }, [targets]);
            useEffect(() => { localStorage.setItem('scheduler_schedules_v2', JSON.stringify(schedules)); }, [schedules]);

            // MULTI-WEEK STATS CALCULATOR
            const getStudentStats = () => {
                const stats = {};
                students.forEach(s => stats[s.id] = { ...s, currentHours: 0, currentShifts: 0, totalHours: 0, totalShifts: 0 });
                
                Object.entries(schedules).forEach(([weekNum, weekSched]) => {
                    Object.entries(weekSched).forEach(([slotId, assignedIds]) => {
                        const shiftTypeId = slotId.split('-')[1];
                        const shiftType = SHIFT_TYPES.find(s => s.id === shiftTypeId);
                        const shiftHours = shiftType ? shiftType.hours : 0; 
                        
                        assignedIds.forEach(id => {
                            if (stats[id]) {
                                stats[id].totalHours += shiftHours;
                                stats[id].totalShifts += 1;
                                // If this is the week we are currently viewing
                                if (parseInt(weekNum) === currentWeek) {
                                    stats[id].currentHours += shiftHours;
                                    stats[id].currentShifts += 1;
                                }
                            }
                        });
                    });
                });
                return stats;
            };

            const studentStats = getStudentStats();
            const totalActiveWeeks = Math.max(1, Object.keys(schedules).length);
            const editingStudent = students.find(s => s.id === editingStudentId);

            // --- Handlers ---
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target.result;
                    // FIX: Safely split lines ignoring carriage returns (\r) from Windows CSVs
                    const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
                    const newStudents = lines.slice(1).map((line, index) => {
                        const columns = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.trim().replace(/^"|"$/g, ''));
                        return { id: Date.now() + index, name: columns[0], unavailable: columns.slice(1).filter(val => val !== "") };
                    }).filter(s => s.name); 

                    if (newStudents.length > 0 && confirm(`Import ${newStudents.length} students? This clears ALL schedules across ALL weeks.`)) {
                        setStudents(newStudents);
                        setSchedules({ 1: {} });
                        setCurrentWeek(1);
                    }
                    e.target.value = ''; 
                };
                reader.readAsText(file);
            };

            const toggleAvailability = (studentId, slotId) => {
                const student = students.find(s => s.id === studentId);
                if (!student) return;
                const isCurrentlyUnavailable = (student.unavailable || []).some(u => u?.toLowerCase() === slotId?.toLowerCase());
                
                setStudents(students.map(s => {
                    if (s.id === studentId) {
                        return isCurrentlyUnavailable 
                            ? { ...s, unavailable: (s.unavailable || []).filter(u => u?.toLowerCase() !== slotId?.toLowerCase()) } 
                            : { ...s, unavailable: [...(s.unavailable || []), slotId] };
                    }
                    return s;
                }));
                
                if (!isCurrentlyUnavailable) {
                    const currentShiftAssigned = schedule[slotId] || [];
                    if (currentShiftAssigned.includes(studentId)) {
                        updateCurrentSchedule({ ...schedule, [slotId]: currentShiftAssigned.filter(id => id !== studentId) });
                    }
                }
            };

            const handleAutoAssign = () => {
                let newSchedule = { ...schedule };
                let currentStats = JSON.parse(JSON.stringify(studentStats)); // Deep copy to mutate safely
                
                let allSlotsToFill = [];
                DAYS.forEach(day => {
                    SHIFT_TYPES.forEach(shift => {
                        const slotId = `${day}-${shift.id}`;
                        const currentAssigned = newSchedule[slotId] || [];
                        const needed = (targets[shift.id] || 0) - currentAssigned.length;
                        for (let i = 0; i < needed; i++) allSlotsToFill.push({ day, shiftId: shift.id, slotId, hours: shift.hours });
                    });
                });

                // FIX: Proper Fisher-Yates shuffle for true randomness, preventing V8 sorting bugs
                for (let i = allSlotsToFill.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [allSlotsToFill[i], allSlotsToFill[j]] = [allSlotsToFill[j], allSlotsToFill[i]];
                }

                allSlotsToFill.forEach(slot => {
                    let eligible = students.filter(s => {
                        const stats = currentStats[s.id];
                        if (!stats) return false;
                        const wouldExceedHours = stats.currentHours + slot.hours > 28; // Absolute hard cap per week
                        const alreadyInShift = (newSchedule[slot.slotId] || []).includes(s.id);
                        const isUnavailable = (s.unavailable || []).some(u => u?.toLowerCase() === slot.slotId?.toLowerCase()); 
                        return !wouldExceedHours && !alreadyInShift && !isUnavailable;
                    });

                    if (eligible.length > 0) {
                        eligible.sort((a, b) => {
                            const statsA = currentStats[a.id];
                            const statsB = currentStats[b.id];
                            
                            const projectedAvgA = (statsA.totalHours + slot.hours) / totalActiveWeeks;
                            const projectedAvgB = (statsB.totalHours + slot.hours) / totalActiveWeeks;
                            
                            if (Math.abs(projectedAvgA - projectedAvgB) > 0.1) {
                                return projectedAvgA - projectedAvgB; 
                            }
                            
                            if (statsA.currentHours !== statsB.currentHours) {
                                return statsA.currentHours - statsB.currentHours;
                            }
                            
                            // FIX: Stable deterministic tie-breaker instead of Math.random()
                            return a.id - b.id;
                        });

                        const selected = eligible[0];
                        newSchedule[slot.slotId] = [...(newSchedule[slot.slotId] || []), selected.id];
                        currentStats[selected.id].currentShifts += 1;
                        currentStats[selected.id].currentHours += slot.hours;
                        currentStats[selected.id].totalHours += slot.hours;
                    }
                });
                updateCurrentSchedule(newSchedule);
            };

            const exportCSV = () => {
                const rows = [];
                const escapeCSV = (str) => String(str).replace(/"/g, '""');
                
                rows.push([`--- WEEK ${currentWeek} SCHEDULE ---`]);
                rows.push(["Day", "Shift", "Assigned Students"]);
                DAYS.forEach(day => {
                    SHIFT_TYPES.forEach(shift => {
                        const slotId = `${day}-${shift.id}`;
                        const assignedIds = schedule[slotId] || [];
                        const studentNames = assignedIds.map(id => {
                            const student = students.find(s => s.id === id);
                            return student ? student.name : "";
                        }).join(", ");
                        rows.push([day, shift.name, `"${escapeCSV(studentNames)}"`]);
                    });
                });

                rows.push([]);
                rows.push(["--- OVERALL STUDENT STATS ---"]);
                rows.push(["Student Name", "Week "+currentWeek+" Hours", "Total Hours", "Rolling Avg (hrs/week)", "Unavailable Slots"]);
                students.forEach(student => {
                    const stats = studentStats[student.id];
                    const avg = (stats.totalHours / totalActiveWeeks).toFixed(1);
                    const unavailableStr = (student.unavailable || []).join(", ");
                    rows.push([`"${escapeCSV(student.name)}"`, stats.currentHours, stats.totalHours, avg, `"${escapeCSV(unavailableStr)}"`]);
                });

                const blob = new Blob([rows.map(r => r.join(",")).join("\n")], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `schedule_week_${currentWeek}.csv`;
                link.click();
            };

            const removeStudent = (id) => {
                if(confirm("Remove this student completely? This will erase them from all past and future weeks.")) {
                    setStudents(students.filter(s => s.id !== id));
                    
                    const updatedSchedules = { ...schedules };
                    Object.keys(updatedSchedules).forEach(week => {
                        const newWeekSched = {};
                        Object.entries(updatedSchedules[week]).forEach(([slot, ids]) => {
                            newWeekSched[slot] = ids.filter(studentId => studentId !== id);
                        });
                        updatedSchedules[week] = newWeekSched;
                    });
                    setSchedules(updatedSchedules);
                }
            };

            const clearRoster = () => {
                if(confirm("Clear ALL students? This will also wipe all schedules across all weeks and cannot be undone.")) {
                    setStudents([]);
                    setSchedules({ 1: {} });
                    setCurrentWeek(1);
                }
            };

            const addStudent = (e) => {
                e.preventDefault();
                if (!newStudentName.trim()) return;
                setStudents([...students, { id: Date.now(), name: newStudentName.trim(), unavailable: [] }]);
                setNewStudentName(""); 
            };

            return (
                <div className="p-6 max-w-[1400px] mx-auto space-y-6 relative transition-colors duration-300">
                    
                    <input 
                        type="file" 
                        accept=".csv" 
                        ref={fileInputRef} 
                        onChange={handleFileUpload} 
                        className="hidden" 
                    />

                    {/* Header & Week Navigation */}
                    <div className="bg-white dark:bg-gray-800 p-4 rounded-lg shadow flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4 border border-transparent dark:border-gray-700">
                        <div>
                            <h1 className="text-2xl font-bold text-gray-800 dark:text-gray-100 flex items-center gap-3">
                                Student Shift Scheduler
                            </h1>
                            <div className="flex items-center gap-4 mt-2">
                                {/* WEEK NAVIGATOR */}
                                <div className="flex items-center bg-gray-50 dark:bg-gray-900/50 rounded-lg p-1 border border-gray-200 dark:border-gray-700 shadow-inner">
                                    <button 
                                        onClick={() => setCurrentWeek(Math.max(1, currentWeek - 1))}
                                        className="px-3 py-1.5 border border-gray-300 dark:border-gray-600 rounded text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors text-sm font-medium shadow-sm"
                                        disabled={currentWeek === 1}
                                        style={{ opacity: currentWeek === 1 ? 0.5 : 1 }}
                                    >← Prev</button>
                                    <span className="px-4 font-bold text-blue-600 dark:text-blue-400">Week {currentWeek}</span>
                                    <button 
                                        onClick={() => {
                                            if (!schedules[currentWeek + 1]) {
                                                setSchedules({...schedules, [currentWeek + 1]: {}});
                                            }
                                            setCurrentWeek(currentWeek + 1);
                                        }}
                                        className="px-3 py-1.5 border border-gray-300 dark:border-gray-600 rounded text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors text-sm font-medium shadow-sm"
                                    >Next →</button>
                                </div>
                                <span className="text-gray-500 dark:text-gray-400 text-sm">Tracking {totalActiveWeeks} weeks</span>
                            </div>
                        </div>
                        
                        {/* UNIFIED BUTTON GROUP REARRANGED */}
                        <div className="flex flex-wrap items-center gap-2">
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 text-sm font-medium transition-colors shadow-sm flex items-center justify-center h-[38px] w-[38px]" title="Toggle Dark Mode">{isDarkMode ? '☀️' : '🌙'}</button>
                            
                            <div className="w-px h-8 bg-gray-300 dark:bg-gray-600 mx-1 hidden sm:block"></div>
                            
                            {/* Roster Controls */}
                            <button onClick={() => fileInputRef.current.click()} className="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 text-sm font-medium transition-colors shadow-sm">📄 Import</button>
                            <button onClick={clearRoster} className="px-3 py-2 border border-red-300 dark:border-red-500/70 rounded text-red-700 dark:text-red-400 bg-red-50 dark:bg-red-900/40 hover:bg-red-100 dark:hover:bg-red-900/60 text-sm font-medium transition-colors shadow-sm">Clear Roster</button>

                            <div className="w-px h-8 bg-gray-300 dark:bg-gray-600 mx-1 hidden sm:block"></div>

                            {/* Schedule Controls */}
                            <button onClick={() => { if(confirm("Clear THIS week's schedule?")) updateCurrentSchedule({}); }} className="px-3 py-2 border border-gray-300 dark:border-gray-600 rounded text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 text-sm font-medium transition-colors shadow-sm">Clear Week {currentWeek}</button>
                            <button onClick={() => { if(confirm("Clear ALL schedules across ALL weeks? This cannot be undone.")) { setSchedules({ 1: {} }); setCurrentWeek(1); } }} className="px-3 py-2 border border-red-300 dark:border-red-500/70 rounded text-red-700 dark:text-red-400 bg-red-50 dark:bg-red-900/40 hover:bg-red-100 dark:hover:bg-red-900/60 text-sm font-medium transition-colors shadow-sm">Clear All</button>

                            <div className="w-px h-8 bg-gray-300 dark:bg-gray-600 mx-1 hidden sm:block"></div>
                            
                            {/* Action Controls */}
                            <button onClick={exportCSV} className="px-3 py-2 border border-green-300 dark:border-green-500/70 rounded text-green-700 dark:text-green-400 bg-green-50 dark:bg-green-900/40 hover:bg-green-100 dark:hover:bg-green-900/60 text-sm font-medium transition-colors shadow-sm">📥 Export</button>
                            <button onClick={handleAutoAssign} className="px-4 py-2 border border-transparent rounded text-white bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 text-sm font-medium transition-colors shadow-sm">✨ Auto-Assign</button>
                        </div>
                    </div>

                    <div className="flex flex-col lg:flex-row gap-6">
                        {/* Main Grid */}
                        <div className="flex-1 bg-white dark:bg-gray-800 rounded-lg shadow overflow-auto max-h-[calc(100vh-140px)] border border-transparent dark:border-gray-700">
                            <table className="w-full text-left border-collapse min-w-[800px]">
                                <thead>
                                    <tr>
                                        <th className="sticky top-0 left-0 z-20 p-3 border-b border-r dark:border-gray-700 bg-gray-100 dark:bg-gray-800 text-gray-800 dark:text-gray-200 shadow-sm">Shift</th>
                                        {DAYS.map(day => <th key={day} className="sticky top-0 z-10 p-3 border-b border-l dark:border-gray-700 bg-gray-50 dark:bg-gray-800 font-medium text-gray-700 dark:text-gray-300 shadow-sm">{day}</th>)}
                                    </tr>
                                </thead>
                                <tbody>
                                    {SHIFT_TYPES.map(shift => (
                                        <tr key={shift.id}>
                                            <td className="sticky left-0 z-10 p-3 border-b border-r dark:border-gray-700 whitespace-nowrap bg-gray-50 dark:bg-gray-800 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)] dark:shadow-[2px_0_5px_-2px_rgba(0,0,0,0.5)]">
                                                <div className="font-semibold text-gray-800 dark:text-gray-200">{shift.name}</div>
                                                <div className="text-xs text-gray-500 dark:text-gray-400 mt-1">Target: {targets[shift.id] || 0}</div>
                                            </td>
                                            {DAYS.map(day => {
                                                const slotId = `${day}-${shift.id}`;
                                                const assigned = schedule[slotId] || [];
                                                const isMet = assigned.length >= (targets[shift.id] || 0);
                                                
                                                return (
                                                    <td key={slotId} className={`p-2 border-b border-l dark:border-gray-700 min-w-[160px] align-top transition-colors ${isMet && (targets[shift.id] || 0) > 0 ? 'bg-green-50/50 dark:bg-green-900/10' : ''}`}>
                                                        <div className="flex flex-col gap-1.5">
                                                            {assigned.map(studentId => {
                                                                const student = students.find(s => s.id === studentId);
                                                                if(!student) return null;
                                                                return (
                                                                    <div key={studentId} className="bg-white dark:bg-gray-700 border dark:border-gray-600 rounded px-2 py-1.5 text-sm shadow-sm flex justify-between items-center group">
                                                                        <span className="truncate pr-2 dark:text-gray-200">{student.name}</span>
                                                                        <button onClick={() => updateCurrentSchedule({...schedule, [slotId]: assigned.filter(id => id !== studentId)})} className="text-gray-400 dark:text-gray-500 hover:text-red-500 dark:hover:text-red-400">✕</button>
                                                                    </div>
                                                                )
                                                            })}
                                                            <select 
                                                                className="text-xs border dark:border-gray-600 rounded p-1.5 bg-gray-50 dark:bg-gray-700/50 hover:bg-gray-100 text-gray-700 dark:text-gray-300 outline-none w-full"
                                                                value=""
                                                                onChange={(e) => {
                                                                    if (!e.target.value) return;
                                                                    updateCurrentSchedule({...schedule, [slotId]: [...assigned, parseInt(e.target.value, 10)]});
                                                                }}
                                                            >
                                                                <option value="">➕ Add...</option>
                                                                {students.filter(s => !assigned.includes(s.id)).map(s => {
                                                                    const stats = studentStats[s.id];
                                                                    const wouldExceed = stats.currentHours + shift.hours > 28;
                                                                    const isUnavailable = (s.unavailable || []).some(u => u?.toLowerCase() === slotId?.toLowerCase());
                                                                    return (
                                                                        <option key={s.id} value={s.id} disabled={wouldExceed || isUnavailable} className="dark:bg-gray-800">
                                                                            {s.name} ({stats.currentHours}h) {wouldExceed ? ' - Max' : ''} {isUnavailable ? ' - Off' : ''}
                                                                        </option>
                                                                    )
                                                                })}
                                                            </select>
                                                        </div>
                                                    </td>
                                                )
                                            })}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        {/* Side Panels */}
                        <div className="w-full lg:w-80 space-y-6 flex-shrink-0">
                            {/* Roster & Hours Tracking */}
                            <div className="bg-white dark:bg-gray-800 p-4 rounded-lg shadow h-[600px] flex flex-col border border-transparent dark:border-gray-700">
                                <div className="flex justify-between items-center border-b dark:border-gray-700 pb-2 mb-3">
                                    <h3 className="font-semibold dark:text-gray-100">Roster & Averages</h3>
                                </div>
                                
                                <form onSubmit={addStudent} className="flex gap-2 mb-3">
                                    <input type="text" value={newStudentName} onChange={(e) => setNewStudentName(e.target.value)} placeholder="Add student..." className="flex-1 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 dark:text-gray-100 rounded p-1.5 text-sm outline-none focus:ring-1 focus:ring-blue-500" />
                                    <button type="submit" className="px-3 py-1.5 bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded text-sm font-medium hover:bg-gray-200 dark:hover:bg-gray-600 dark:text-gray-200 transition-colors">Add</button>
                                </form>

                                <div className="overflow-y-auto flex-1 space-y-2 pr-2">
                                    {students.map(student => {
                                        const stats = studentStats[student.id];
                                        const isWarning = stats.currentHours >= 28;
                                        
                                        const avgHoursNum = parseFloat((stats.totalHours / totalActiveWeeks).toFixed(1));
                                        
                                        // Minimum 15 Hours Coloring
                                        let avgColorClass = "text-green-600 dark:text-green-400"; // Hitting minimum (>= 15)
                                        if (avgHoursNum < 15) {
                                            avgColorClass = "text-amber-600 dark:text-amber-500"; // Under Target
                                        }

                                        return (
                                            <div key={student.id} className={`flex flex-col p-2 rounded border transition-colors ${isWarning ? 'bg-red-50 border-red-300 dark:bg-red-900/20 dark:border-red-700/50' : 'bg-gray-50 border-gray-200 dark:bg-gray-700/50 dark:border-gray-600'}`}>
                                                <div className="flex justify-between items-start">
                                                    <div>
                                                        <div className="font-medium text-sm text-gray-800 dark:text-gray-200">{student.name}</div>
                                                        <div className="flex flex-col mt-1">
                                                            <span className={`text-xs ${isWarning ? 'text-red-700 dark:text-red-500 font-bold' : 'text-gray-600 dark:text-gray-300'}`}>
                                                                Week {currentWeek}: <strong>{stats.currentHours}h</strong> <span className="text-[10px] text-gray-400">(Max 28)</span>
                                                            </span>
                                                            <span className={`text-[11px] font-medium mt-0.5 ${avgColorClass}`}>
                                                                Rolling Avg: {avgHoursNum}h / week
                                                            </span>
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => setEditingStudentId(student.id)} className="text-xs text-blue-600 dark:text-blue-400 hover:text-blue-800">Edit</button>
                                                        <button onClick={() => removeStudent(student.id)} className="text-gray-400 hover:text-red-500">✕</button>
                                                    </div>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>
                            
                            {/* Targets Panel */}
                            <div className="bg-white dark:bg-gray-800 p-4 rounded-lg shadow border border-transparent dark:border-gray-700">
                                <h3 className="font-semibold border-b dark:border-gray-700 pb-2 mb-3 dark:text-gray-100">Shift Staffing Targets</h3>
                                {SHIFT_TYPES.map(shift => (
                                    <div key={shift.id} className="flex justify-between items-center mb-2">
                                        <label className="text-sm dark:text-gray-300">{shift.name}</label>
                                        <input 
                                            type="number" min="0" value={targets[shift.id] === undefined ? "" : targets[shift.id]}
                                            onChange={(e) => setTargets({...targets, [shift.id]: e.target.value === "" ? "" : parseInt(e.target.value, 10)})}
                                            className="w-16 border border-gray-300 dark:border-gray-600 rounded p-1 text-center bg-white dark:bg-gray-700 dark:text-gray-100 outline-none focus:ring-1 focus:ring-blue-500"
                                        />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* EDIT STUDENT MODAL */}
                    {editingStudentId && editingStudent && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-2xl flex flex-col max-h-[90vh]">
                                <div className="p-4 border-b dark:border-gray-700 flex justify-between items-center">
                                    <h2 className="text-lg font-bold dark:text-gray-100">Edit Student</h2>
                                    <button onClick={() => setEditingStudentId(null)} className="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">✕</button>
                                </div>
                                
                                <div className="p-4 overflow-y-auto">
                                    <div className="mb-4">
                                        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Student Name</label>
                                        <input 
                                            type="text" 
                                            value={editingStudent.name}
                                            onChange={(e) => setStudents(students.map(s => s.id === editingStudentId ? {...s, name: e.target.value} : s))}
                                            className="w-full border dark:border-gray-600 rounded p-2 bg-white dark:bg-gray-700 dark:text-gray-100 outline-none focus:ring-2 focus:ring-blue-500"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Unavailable Shifts (Click to toggle)</label>
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
                                            {DAYS.map(day => 
                                                SHIFT_TYPES.map(shift => {
                                                    const slotId = `${day}-${shift.id}`;
                                                    const isUnavailable = (editingStudent.unavailable || []).includes(slotId);
                                                    return (
                                                        <button 
                                                            key={slotId}
                                                            onClick={() => toggleAvailability(editingStudentId, slotId)}
                                                            className={`p-2 text-xs rounded border transition-colors ${
                                                                isUnavailable 
                                                                    ? 'bg-red-100 border-red-300 text-red-800 dark:bg-red-900/40 dark:border-red-800 dark:text-red-300' 
                                                                    : 'bg-green-50 border-green-200 text-green-800 hover:bg-green-100 dark:bg-gray-700 dark:border-gray-600 dark:text-gray-300 dark:hover:bg-gray-600'
                                                            }`}
                                                        >
                                                            <div className="font-semibold">{day.substring(0,3)}</div>
                                                            <div>{shift.name}</div>
                                                            <div className="mt-1 font-bold">{isUnavailable ? '❌ Off' : '✅ Available'}</div>
                                                        </button>
                                                    )
                                                })
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <div className="p-4 border-t dark:border-gray-700 flex justify-end">
                                    <button onClick={() => setEditingStudentId(null)} className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-medium transition-colors">Done</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
